services:
  - type: web
    name: clawdagent
    runtime: node
    buildCommand: corepack enable && corepack prepare pnpm@latest --activate && pnpm install --frozen-lockfile && cd web && npm install && npm run build && cd .. && pnpm build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: BIND_HOST
        value: "0.0.0.0"
      - key: RENDER
        value: "true"
    healthCheckPath: /
