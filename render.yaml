databases:
  - name: clawdagent-db
    plan: free
    databaseName: clawdagent
    user: clawdagent

services:
  - type: web
    name: clawdagent
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: BIND_HOST
        value: "0.0.0.0"
      - key: DATABASE_URL
        fromDatabase:
          name: clawdagent-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AI_MODEL
        value: claude-sonnet-4-6
      - key: PROVIDER_MODE
        value: auto
      - key: PREFER_FREE_MODELS
        value: "true"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_IDS
        sync: false
      - key: WHATSAPP_ENABLED
        value: "false"
      - key: HEARTBEAT_ENABLED
        value: "true"
      - key: LOG_LEVEL
        value: info
