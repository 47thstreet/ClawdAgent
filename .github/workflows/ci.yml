# ──────────────────────────────────────────────────────────────────────────────
# CI — lint · type-check · test · build · docker smoke-test
#
# Triggers: push to main, any PR targeting main
# Runner:   ubuntu-latest (GitHub-hosted)
# ──────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same branch / PR when a new commit arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Static analysis (lint + type-check) ───────────────────────────────────
  check:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run type-check

      - name: Lint
        run: pnpm run lint

  # ── 2. Unit / integration tests (requires Postgres + Redis) ──────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: clawdagent
          POSTGRES_PASSWORD: clawdagent
          POSTGRES_DB: clawdagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test:run
        env:
          DATABASE_URL: postgres://clawdagent:clawdagent@localhost:5432/clawdagent
          REDIS_URL: redis://localhost:6379
          # Minimum-length secret required by JWT validation
          JWT_SECRET: ci-test-secret-at-least-32-characters-long
          NODE_ENV: test

  # ── 3. TypeScript production build (uses tsconfig.build.json) ────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (tsconfig.build.json)
        run: pnpm run build

      # Cache the compiled output so the docker job can reuse it.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 1

  # ── 4. Docker smoke-test (only on push to main, after all checks pass) ────────
  docker:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    # Only run on pushes to main; skip for PRs (saves minutes, avoids secrets).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [check, test, build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: production
          push: false
          # Use inline cache to speed up repeated builds on the same branch.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: clawdagent/clawdagent:ci-${{ github.sha }}

      - name: Smoke test — container starts and exits cleanly
        run: |
          # Spin up the production image with a no-op command to verify the
          # entrypoint and base OS are healthy. The real app needs a database,
          # so we only validate the container itself, not the application.
          docker run --rm \
            --entrypoint node \
            clawdagent/clawdagent:ci-${{ github.sha }} \
            --version
